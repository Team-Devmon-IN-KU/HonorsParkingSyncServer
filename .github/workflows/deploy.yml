name: Deploy To EC2

on:
  push:
    branches:
      #- feat/cicd
      - feat/sync
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 커밋한 파일들을 불러옴
      - name: Github Repository 파일 불러오기
        # 레포지토리에 저장되어있는 코드 불러오는 라이브러리
        uses: actions/checkout@v4

      # Github Actions에 빌드, 테스트 할 때 필요한 JDK 설치
      - name: Amazon Corretto 8 설치
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 8

      # application.yml 파일 생성
      - name: application.yml 파일 만들기
        run: |
          mkdir -p ./src/main/resources/config
          echo "${{ secrets.APPLICATION_YML }}" > ./src/main/resources/config/application.yml

      # application.properties 파일 생성
      - name: application.properties 파일 만들기
        run: |
          mkdir -p ./src/main/resources/config
          echo "${{ secrets.APPLICATION_PROD_YML }}" > ./src/main/resources/config/application-prod.yml

      - name: 테스트 및 빌드하기
        run: ./gradlew clean build

      # ECR에 접근할 수 있는 권한을 허용받기 위해
      - name: AWS Resource에 접근할 수 있게 AWS credentials 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Docker 이미지 생성
        run: docker compose build
        # . 은 현재 경로의 Dockerfile을 기반으로 이미지 파일 생성

      - name: Docker 이미지에 Tag 붙이기
        run: docker tag honorsparkingsyncserver-backend:latest gyural/honorsparkingsyncserver-backend:latest

      # DockerHub Login
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: docker Hub에 Docker 이미지 Push하기
        run: docker push gyural/honorsparkingsyncserver-backend:latest

      - name: SSH(원격 접속)로 EC2에 접속하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            docker stop honorsparking-sync-server || true
            docker rm honorsparking-sync-server || true
            docker pull gyural/honorsparking-server:latest
            docker run -d --name honorsparking-sync-server -p 8080:8080 gyural/honorsparkingsyncserver-backend:latest
